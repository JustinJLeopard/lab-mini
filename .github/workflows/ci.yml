name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check src/lab_mini tests
      - run: ruff format --check src/lab_mini tests
      - run: mypy src/lab_mini
      - run: pytest -q --cov=lab_mini --cov-fail-under=95

